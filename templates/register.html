<!DOCTYPE html>
<html>
<head>
    <title>Register - MediZone</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #dfe9f3, #f7f9f9);
        }

        .header {
            text-align: center;
            padding: 30px;
            background: #0b3d91;   /* 🔵 dark blue */
            color: white;
        }

        .container {
            width: 350px;
            margin: 60px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.15);
            text-align: center;
        }

        h2 {
            color: #0b3d91;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        button {
            width: 95%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background: #0f5132;   /* 🟢 dark green */
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #083c25;
        }
    </style>

</head>

<body>

<div class="header">
    <h1>🏥 MediZone Register</h1>
    <p>Create Your Health Account</p>
</div>

<div class="container">

    <h2>Register</h2>

    <form method="POST">
        <input type="text" name="name" placeholder="Enter Name" required><br>
        <input type="email" name="email" placeholder="Enter Email" required><br>
        <input type="password" name="password" placeholder="Enter Password" required><br>
        <button type="submit">📝 Register</button>
    </form>

</div>

</body>
</html>
