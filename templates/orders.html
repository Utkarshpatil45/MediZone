<!DOCTYPE html>
<html>
<head>
    <title>My Orders - MediZone</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #dfe9f3, #f7f9f9);
        }

        .header {
            text-align: center;
            padding: 30px;
            background: #0b3d91;
            color: white;
        }

        h2 {
            text-align: center;
            color: #0b3d91;
            margin-top: 20px;
        }

        .container {
            width: 80%;
            margin: auto;
            margin-top: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin: 15px 0;
            border-radius: 12px;
            box-shadow: 0px 0px 12px rgba(0,0,0,0.15);
            border-left: 6px solid #0f5132; /* green highlight */
        }

        .card h4 {
            color: #0b3d91;
            margin: 5px 0;
        }

        .status {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 6px;
            background: #0f5132;
            color: white;
            font-size: 13px;
        }

        .pending {
            background: orange;
        }

        .delivered {
            background: #0f5132;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 15px;
            background: #0b3d91;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }

        .btn:hover {
            background: #062a66;
        }

    </style>

</head>

<body>

<div class="header">
    <h1>📦 MediZone Orders</h1>
    <p>Your Purchase History</p>
</div>

<h2>My Orders</h2>

<div class="container">

{% for o in orders %}
<div class="card">

    <h4>🧾 Order ID: {{ o[0] }}</h4>
    <p>💰 Total: ₹{{ o[1] }}</p>
    <p>📅 Date: {{ o[2] }}</p>

    <p>
        <strong>Status:</strong>
        <span class="status">{{ o[3] }}</span>
    </p>

</div>
{% endfor %}

<a class="btn" href="/products">🛒 Back to Products</a>

</div>

</body>
</html>
