<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Appointments - MediZone</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #dfe9f3, #f7f9f9);
        }

        .header {
            text-align: center;
            padding: 30px;
            background: #0b3d91;
            color: white;
        }

        h2 {
            text-align: center;
            margin-top: 20px;
            color: #0b3d91;
        }

        .container {
            width: 80%;
            margin: auto;
            margin-top: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin: 15px 0;
            border-radius: 12px;
            box-shadow: 0px 0px 12px rgba(0,0,0,0.15);
            border-left: 6px solid #0f5132; /* green highlight */
        }

        .card p {
            margin: 5px 0;
            font-size: 15px;
        }

        .status {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 6px;
            background: #0f5132;
            color: white;
            font-size: 13px;
        }

        .pending {
            background: orange;
        }

        .confirmed {
            background: #0f5132;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 12px;
            background: #0b3d91;
            color: white;
            text-decoration: none;
            border-radius: 6px;
        }

        .btn:hover {
            background: #062a66;
        }

    </style>

</head>

<body>

<div class="header">
    <h1>📅 MediZone</h1>
    <p>My Appointments</p>
</div>

<h2>My Appointments</h2>

<div class="container">

{% for a in appointments %}
<div class="card">

    <p><strong>👤 Name:</strong> {{ a[1] }}</p>
    <p><strong>👨‍⚕️ Doctor:</strong> {{ a[3] }}</p>
    <p><strong>📅 Date:</strong> {{ a[4] }}</p>
    <p><strong>⏰ Time:</strong> {{ a[5] }}</p>

    <p>
        <strong>Status:</strong>
        <span class="status">{{ a[6] }}</span>
    </p>

    <a class="btn" href="/doctor_consult">Book New Appointment</a>

</div>
{% endfor %}

</div>

</body>
</html>
