<!DOCTYPE html>
<html>
<head>
    <title>Login - MediZone</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: url("https://images.unsplash.com/photo-1588776814546-1ffcf47267a5") no-repeat center center/cover;
        }

        /* Dark Overlay */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
        }

        .container {
            position: relative;
            width: 380px;
            padding: 35px;
            border-radius: 15px;
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
            color: white;
        }

        h2 {
            margin-bottom: 20px;
            font-size: 26px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 14px;
        }

        input:focus {
            box-shadow: 0 0 8px #0f5132;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            background: #0f5132;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #083c25;
            transform: scale(1.05);
        }

        .header-text {
            position: absolute;
            top: 30px;
            text-align: center;
            color: white;
        }

        .header-text h1 {
            font-size: 32px;
        }

        .header-text p {
            font-size: 14px;
            opacity: 0.9;
        }

    </style>

</head>

<body>

<div class="header-text">
    <h1>🏥 MediZone</h1>
    <p>Secure Access to Your Health Dashboard</p>
</div>

<div class="container">
    <h2>🔐 Login</h2>

    <form method="POST">
        <input type="email" name="email" placeholder="Enter Email" required>
        <input type="password" name="password" placeholder="Enter Password" required>
        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
