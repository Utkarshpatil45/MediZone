<!DOCTYPE html>
<html>
<head>
    <title>Book Appointment | MediZone</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f9f9;
        }

        .navbar {
            background: #0f5132;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
        }

        .container {
            width: 400px;
            margin: 50px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #0f5132;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: 2px solid #0f5132;
            border-radius: 8px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background: #0f5132;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #157347;
        }
    </style>
</head>

<body>

<div class="navbar">
    🏥 MediZone Appointment Booking
</div>

<div class="container">

    <h2>Book Appointment 📅</h2>

    <form action="/Appointment" method="POST">

        <input type="text" name="name" placeholder="Your Name" required>

        <input type="email" name="email" placeholder="Your Email" required>

        <select name="doctor" required>
            <option value="">Select Doctor</option>
            <option>Cardiologist</option>
            <option>Dermatologist</option>
            <option>General Physician</option>
        </select>

        <input type="date" name="date" required>

        <input type="time" name="time" required>

        <button type="submit">Book Appointment</button>

    </form>

</div>

</body>
</html>
