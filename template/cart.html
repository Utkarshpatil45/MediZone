<!DOCTYPE html>
<html>
<head>
    <title>Your Cart | MediZone</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f9f9;
        }

        .navbar {
            background: #0f5132;
            color: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
        }

        h2 {
            text-align: center;
            margin-top: 30px;
            color: #0f5132;
        }

        table {
            width: 85%;
            margin: 30px auto;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        th, td {
            padding: 12px;
            text-align: center;
        }

        th {
            background: #0f5132;
            color: white;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }

        .action-btn {
            padding: 5px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            color: white;
        }

        .increase { background: green; }
        .decrease { background: orange; }
        .remove { background: red; }

        .total {
            text-align: right;
            width: 85%;
            margin: 20px auto;
            font-size: 18px;
            font-weight: bold;
        }

        .btn {
            display: block;
            width: 200px;
            margin: 20px auto;
            padding: 12px;
            background: #0f5132;
            color: white;
            border: none;
            border-radius: 8px;
            text-align: center;
            text-decoration: none;
        }

        .empty {
            text-align: center;
            margin-top: 50px;
            font-size: 18px;
            color: gray;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div>🏥 MediZone</div>
    <div>
        <a href="/">Home</a>
        <a href="/products">Products</a>
        <a href="/cart">Cart 🛒</a>
    </div>
</div>

<h2>Your Shopping Cart 🛒</h2>

{% if items %}

<table>
    <tr>
        <th>Medicine</th>
        <th>Price</th>
        <th>Quantity</th>
        <th>Total</th>
        <th>Actions</th>
    </tr>

    {% for item in items %}
    <tr>
        <!-- Name -->
        <td>{{ item[1] }}</td>

        <!-- Price -->
        <td>₹ {{ item[2] }}</td>

        <!-- Quantity -->
        <td>{{ item[3] }}</td>

        <!-- Subtotal -->
        <td>₹ {{ item[4] }}</td>

        <!-- Actions -->
        <td>
            <a href="/increase/{{ item[0] }}">
                <button class="action-btn increase">+</button>
            </a>

            <a href="/decrease/{{ item[0] }}">
                <button class="action-btn decrease">-</button>
            </a>

            <a href="/remove/{{ item[0] }}">
                <button class="action-btn remove">Remove</button>
            </a>
        </td>
    </tr>
    {% endfor %}

</table>

<!-- GRAND TOTAL -->
<div class="total">
    Grand Total: ₹ {{ total }}
</div>


<!-- BUY NOW BUTTON HERE -->
<a href="/checkout">
    <button class="btn">Buy Now 💳</button>
</a>


{% else %}

<div class="empty">
    Your cart is empty 🛒
</div>

{% endif %}

<a href="/products" class="btn">Continue Shopping</a>

</body>
</html>
