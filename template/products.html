


<!DOCTYPE html>
<html>
<head>
    <title>Products - MediZone</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f4f8fb;
        }

        /* Navbar */
        .navbar {
            background: #0f5132;
            padding: 15px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
        }

        h2 {
            text-align: center;
            margin: 30px 0;
            color: #0f5132;
        }

        .container {
            text-align: center;
        }

        .card {
            display: inline-block;
            width: 240px;
            margin: 15px;
            padding: 15px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            vertical-align: top;
        }

        .card img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            margin-bottom: 10px;
        }

        .price {
            color: green;
            font-weight: bold;
            margin: 5px 0;
        }

        .stock {
            font-size: 14px;
        }

        .in {
            color: green;
            font-weight: bold;
        }

        .out {
            color: red;
            font-weight: bold;
        }

        .btn {
            margin-top: 10px;
            padding: 8px 12px;
            border: none;
            background: #0f5132;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn:hover {
            background: #157347;
        }

        .btn-disabled {
            background: grey;
            cursor: not-allowed;
        }
        .search-container {
    text-align: center;
    margin: 20px 0;
}

.search-box {
    display: inline-flex;
    align-items: center;
    background: white;
    padding: 8px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.search-box input {
    width: 280px;
    padding: 10px 12px;
    border: 2px solid #0f5132;
    border-radius: 8px;
    outline: none;
    font-size: 14px;
}

.search-box input:focus {
    border-color: #157347;
    box-shadow: 0 0 6px rgba(21,115,71,0.3);
}

.search-box button {
    padding: 10px 16px;
    margin-left: 8px;
    border: none;
    background: #0f5132;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
}

.search-box button:hover {
    background: #157347;
    transform: scale(1.05);
}

        




    </style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <div>🏥 MediZone</div>
    <div>
        <a href="/">Home</a>
        <a href="/products">Products</a>
        <a href="/cart">Cart 🛒</a>
        <a href="/login">Login</a>
    </div>
</div>

<h2>Medicines 💊</h2>

<!-- 🔍 Search Bar -->
<div style="text-align:center; margin-bottom:20px;">
    <form method="GET" action="/products">
    <input type="text"
           name="search"
           value="{{ search if search else '' }}"
           placeholder="Search medicine...">
    <button type="submit">Search</button>
</form>
</div>

<div class="container">

{% for p in products %}
<div class="card">

    <!-- Product Image -->
    {% if p[4] %}
        <img src="static/images/paracetamol.webp">
    {% else %}
        <img src="https://via.placeholder.com/120x120?text=Medicine">
    {% endif %}

    <h3>{{ p[1] }}</h3>
    <p>{{ p[2] }}</p>

    <p class="price">₹ {{ p[3] }}</p>

    <p class="stock">Stock: {{ p[6] }}</p>

    {% if p[6] > 0 %}
        <p class="in">In Stock</p>

        <a href="/add_to_cart/{{ p[0] }}">
            <button class="btn">Add to Cart 🛒</button>
        </a>
    {% else %}
        <p class="out">Out of Stock</p>
        <button class="btn btn-disabled" disabled>Unavailable</button>
    {% endif %}

</div>
{% endfor %}

</div>

</body>
</html>
