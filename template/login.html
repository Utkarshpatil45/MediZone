<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Login | MediZone</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f6f9fc;
}

/* HEADER (same theme as index) */
.header {
    background: #0f5132;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 25px;
    color: white;
    position: sticky;
    top: 0;
}

.logo {
    font-weight: bold;
    font-size: 16px;
}

.nav {
    display: flex;
    gap: 20px;
}

.nav a {
    color: white;
    text-decoration: none;
    font-weight: bold;
}

.nav a:hover {
    color: #b7f7c1;
}

/* LOGIN BOX */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 85vh;
}

.box {
    background: white;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    width: 320px;
    text-align: center;
}

.box h2 {
    color: #0f5132;
    margin-bottom: 20px;
}

/* INPUT */
input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border: 1px solid #ccc;
    border-radius: 6px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 10px;
    background: #0f5132;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #157347;
}

/* HOME BUTTON */
.home-btn {
    margin-top: 10px;
    background: #6c757d;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">

    <div class="logo">
        🏥 MediZone HealthTech
    </div>

    <div class="nav">
        <a href="/">Home</a>
        <a href="/login">Login</a>
        <a href="/register">Register</a>
        <a href="/products">Products</a>
        <a href="/cart">Cart 🛒</a>
    </div>

</div>

<!-- LOGIN FORM -->
<div class="container">

    <div class="box">

        <h2>Login 🔐</h2>

        <form method="POST">

            <input type="email" name="email" placeholder="Enter Email" required>

            <input type="password" name="password" placeholder="Enter Password" required>

            <button type="submit">Login</button>

        </form>

        <!-- FIXED HOME BUTTON -->
        <button class="home-btn" onclick="goHome()">Go to Home</button>

    </div>

</div>

<!-- JS -->
<script>
function goHome() {
    window.location.href = "/";
}
</script>

</body>
</html>
