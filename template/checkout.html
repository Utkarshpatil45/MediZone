<!DOCTYPE html>
<html>
<head>
    <title>Checkout | MediZone</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f9f9;
        }

        /* Navbar */
        .navbar {
            background: #0f5132;
            color: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
        }

        /* Container */
        .container {
            text-align: center;
            margin-top: 80px;
        }

        .card {
            display: inline-block;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            animation: pop 0.6s ease;
        }

        h1 {
            color: #0f5132;
        }

        .total {
            font-size: 22px;
            margin: 20px 0;
            font-weight: bold;
        }

        .btn {
            display: inline-block;
            padding: 10px 18px;
            background: #0f5132;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            margin: 10px;
        }

        .btn:hover {
            background: #157347;
        }

        /* Animation */
        @keyframes pop {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* Success icon */
        .check {
            font-size: 50px;
            color: green;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div>🏥 MediZone</div>
    <div>
        <a href="/">Home</a>
        <a href="/products">Products</a>
        <a href="/cart">Cart 🛒</a>
    </div>
</div>

<!-- MAIN -->
<div class="container">

    <div class="card">

        <div class="check">✔</div>

        <h1>Order Placed Successfully!</h1>

        <div class="total">
            Total Paid: ₹ {{ total }}
        </div>

        <a href="/products" class="btn">Continue Shopping 🛍️</a>

    </div>

</div>

<!-- JS CONFETTI EFFECT -->
<script>
    // simple celebration effect
    window.onload = function() {
        console.log("Order success page loaded 🎉");
    }
</script>

</body>
</html>
