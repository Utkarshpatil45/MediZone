<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register - MediZone</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f4f8fb;
}

/* Navbar */
.navbar {
    background: #0f5132;
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: white;
}

.navbar h2 {
    margin: 0;
}

.navbar a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
    font-weight: bold;
}

.navbar a:hover {
    text-decoration: underline;
}

/* Register Box */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 85vh;
}

.register-box {
    background: white;
    padding: 35px;
    width: 350px;
    border-radius: 10px;
    box-shadow: 0px 5px 20px rgba(0,0,0,0.1);
}

.register-box h2 {
    text-align: center;
    color: #0f5132;
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: 1px solid #ccc;
    border-radius: 6px;
}

button {
    width: 100%;
    padding: 10px;
    background: #0f5132;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    margin-top: 10px;
}

button:hover {
    background: #157347;
}

.login-link {
    text-align: center;
    margin-top: 15px;
}

.login-link a {
    color: #0f5132;
    text-decoration: none;
    font-weight: bold;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <h2>🏥 MediZone HealthTech</h2>
    <div>
        <a href="/">Home</a>
        <a href="/login">Login</a>
        <a href="/products">Products</a>
        <a href="/cart">Cart</a>
    </div>
</div>

<!-- REGISTER FORM -->
<div class="container">
    <div class="register-box">
        <h2>Create Account</h2>

        <form method="POST" onsubmit="return validateForm()">
            <input type="text" name="name" id="name" placeholder="Full Name" required>
            <input type="email" name="email" id="email" placeholder="Email Address" required>
            <input type="password" name="password" id="password" placeholder="Password" required>
            <button type="submit">Register</button>
        </form>

        <div class="login-link">
            Already have an account? <a href="/login">Login</a>
        </div>
    </div>
</div>

<!-- JS Validation -->
<script>
function validateForm() {
    var password = document.getElementById("password").value;

    if (password.length < 6) {
        alert("Password must be at least 6 characters long!");
        return false;
    }

    return true;
}
</script>

</body>
</html>
